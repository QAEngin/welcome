<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>HOT Business</title>

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

    <!-- ICONS -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- PDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <script defer src="app.js"></script>

</head>

<body>

    <!-- TOP -->

    <!-- TOP -->

<section class="top-banner">

    <img src="assets/logo.png"
        class="logo">

    <div class="banner-text">

        <h1>
            ברוכים הבאים לשירותי HOT Business
        </h1>

        <p>
            מדריכי שירות ופיצ'רים למרכזייה העסקית
        </p>

    </div>

</section>

<!-- SEARCH -->

<section class="search-bar-section">

    <input
    type="text"
    id="guideSearch"
    placeholder="חיפוש מדריך או נושא..."
    onkeyup="searchGuides()">

    <i class="fa-solid fa-magnifying-glass"></i>

</section>

    <!-- FEATURES -->

    <section class="features"
        id="featuresSection">

        <div class="card"
            onclick="toggleGuide('fax')">

            <i class="fa-solid fa-fax"></i>

            <h3>מייל 2 פקס</h3>

            <p>
                שליחת פקסים מהמייל
            </p>

        </div>

        <div class="card"
            onclick="toggleGuide('sms')">

            <i class="fa-solid fa-message"></i>

            <h3>SMS</h3>

            <p>
                הודעות עסקיות
            </p>

        </div>

        <div class="card"
            onclick="toggleGuide('recordings')">

            <i class="fa-solid fa-phone-volume"></i>

            <h3>הקלטות שיחות</h3>

            <p>
                גישה להקלטות ודוחות
            </p>

        </div>

        <div class="card"
            onclick="toggleGuide('yealink')">

            <i class="fa-solid fa-phone"></i>

            <h3>מדריך Yealink</h3>

            <p>
                מדריך למשתמש
            </p>

        </div>

    </section>

    <!-- GUIDE -->

    <section class="guide-container">

        <div id="guideContent"></div>

    </section>

    <!-- FLOATING WHATSAPP -->

    <a class="floating-whatsapp"
        href="https://wa.me/972778066666"
        target="_blank">

        <i class="fa-brands fa-whatsapp"></i>

    </a>

</body>

</html>
