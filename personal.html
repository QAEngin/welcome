<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOT Business - אזור אישי</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="config.js?v=1.1"></script>
    <script src="fireberry-api.js?v=1.1"></script>
    <script src="personal.js?v=1.1"></script>
</head>

<body>
    <header class="top-banner" aria-label="HOT Business">
        <nav class="banner-nav">
            <a href="index.html" class="nav-logo" aria-label="HOT Business דף הבית">
                <img src="assets/logo.png" class="logo" alt="HOT Business">
            </a>

            <div class="nav-center" aria-label="ניווט">
                <a href="index.html#services" class="nav-link nav-services-link">
                    <span>שירותים</span>
                </a>
                <a href="index.html" class="nav-link nav-home-link" aria-label="בית" title="בית">
                    <i class="fa-solid fa-house" aria-hidden="true"></i>
                </a>
                <a href="index.html#search" class="nav-link nav-search-link" onclick="closeMobileGuideMenu()" aria-label="חיפוש" title="חיפוש">
                    <i class="fa-solid fa-magnifying-glass nav-mobile-icon" aria-hidden="true"></i>
                    <span>חיפוש</span>
                </a>
                <a href="personal.html" class="nav-link nav-icon-action active" aria-label="אזור אישי" title="אזור אישי">
                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                </a>
                <button class="nav-link nav-menu-action" type="button" onclick="toggleMobileGuideMenu()" aria-label="תפריט מדריכים" title="תפריט מדריכים" aria-expanded="false">
                    <i class="fa-solid fa-bars" aria-hidden="true"></i>
                </button>
            </div>

            <div class="mobile-guide-menu" id="mobileGuideMenu" aria-label="תפריט מדריכים">
                <button type="button" onclick="openGuideFromMobileMenu('fax')">מייל 2 פקס</button>
                <button type="button" onclick="openGuideFromMobileMenu('sms')">SMS</button>
                <button type="button" onclick="openGuideFromMobileMenu('recordings')">הקלטות שיחות</button>
                <button type="button" onclick="openGuideFromMobileMenu('callForward')">הפניית שיחה</button>
                <button type="button" onclick="openGuideFromMobileMenu('yealink')">מדריך Yealink</button>
                <button type="button" onclick="openGuideFromMobileMenu('cloudSoftphone')">Cloud Softphone</button>
            </div>

            <a href="https://wa.me/972778066666" target="_blank" rel="noopener" class="nav-support-btn">
                <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
                <span>תמיכה</span>
            </a>
        </nav>
    </header>

    <main class="personal-main">
        <!-- Login Section -->
        <section class="personal-login" id="login-section">
            <div class="container">
                <div class="login-card">
                    <div class="login-header">
                        <h1 class="login-title">אזור אישי</h1>
                        <p class="login-subtitle">הכנסו את מספר עוסק מורשה ומספר הטלפון שלכם לצפייה בפרטי החשבון</p>
                    </div>

                    <form class="login-form" id="customer-login-form">
                        <div class="form-group">
                            <label for="ltd-number" class="form-label">
                                <i class="fas fa-building" aria-hidden="true"></i>
                                מספר עוסק מורשה (9 ספרות)
                            </label>
                            <input type="text"
                                   id="ltd-number"
                                   name="ltd-number"
                                   class="form-input"
                                   placeholder="123456789"
                                   maxlength="9"
                                   required
                                   autocomplete="off">
                            <div class="form-error" id="ltd-error"></div>
                        </div>

                        <div class="form-group">
                            <label for="phone-number" class="form-label">
                                <i class="fas fa-phone" aria-hidden="true"></i>
                                מספר טלפון (9-10 ספרות)
                            </label>
                            <input type="text"
                                   id="phone-number"
                                   name="phone-number"
                                   class="form-input"
                                   placeholder="026255870"
                                   maxlength="10"
                                   required
                                   autocomplete="off">
                            <div class="form-error" id="phone-error"></div>
                        </div>

                        <button type="submit" class="login-btn" id="login-btn">
                            <span class="btn-text">כניסה לאזור האישי</span>
                            <i class="fas fa-arrow-left btn-icon" aria-hidden="true"></i>
                        </button>
                    </form>

                    <div class="login-error" id="general-error"></div>
                    <div class="login-loading" id="loading-indicator" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>מחפש את הפרטים שלכם...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Customer Details Section -->
        <section class="customer-details" id="details-section" style="display: none;">
            <div class="container">
                <div class="details-header">
                    <h2 class="details-title">פרטי החשבון שלכם</h2>
                    <div class="session-info">
                        <span class="session-timer">זמן תצוגה נותר: <span id="session-countdown">2:00</span></span>
                        <button class="logout-btn" id="logout-btn">
                            <i class="fas fa-sign-out-alt"></i>
                            יציאה
                        </button>
                    </div>
                </div>

                <div class="details-grid" id="customer-data">
                    <!-- Customer information will be populated here -->
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 HOT Business. כל הזכויות שמורות.</p>
        </div>
    </footer>
</body>
</html>
