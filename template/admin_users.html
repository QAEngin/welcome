<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('admin.users_title') }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/nav.css">
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  {% include "_site_nav.html" %}

  <main class="admin-page">
    <section class="admin-panel">
      <header class="admin-header">
        <div>
          <p class="eyebrow">{{ t('admin.eyebrow') }}</p>
          <h1>{{ t('admin.users_title') }}</h1>
        </div>
        <button class="primary-btn" type="button" id="toggle-create-user">{{ t('admin.create_user') }}</button>
      </header>

      <section class="filters">
        <input class="tech-ltr" type="text" id="filter-email" placeholder="{{ t('admin.search_email') }}">
        <select id="filter-status">
          <option value="">{{ t('admin.all_statuses') }}</option>
          <option value="enabled">{{ t('admin.enabled') }}</option>
          <option value="disabled">{{ t('admin.disabled') }}</option>
        </select>
        <input class="tech-ltr" type="date" id="filter-created-from">
        <input class="tech-ltr" type="date" id="filter-created-to">
        <button class="secondary-btn" type="button" id="apply-user-filters">{{ t('admin.apply') }}</button>
      </section>

      <section class="create-user-card hidden" id="create-user-card">
        <div class="form-grid">
          <input class="tech-ltr" type="email" id="new-user-email" placeholder="user@nimbusip.com">
          <input type="password" id="new-user-password" placeholder="{{ t('admin.temp_password') }}">
          <select id="new-user-role">
            <option value="user">{{ t('role.user') }}</option>
            <option value="admin">{{ t('role.admin') }}</option>
          </select>
          <button class="primary-btn" type="button" id="create-user-btn">{{ t('admin.create') }}</button>
        </div>
        <p class="inline-message" id="create-user-message"></p>
      </section>

      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>{{ t('admin.email') }}</th>
              <th>{{ t('admin.status') }}</th>
              <th>{{ t('admin.role') }}</th>
              <th>{{ t('admin.created') }}</th>
              <th>{{ t('admin.last_sign_in') }}</th>
              <th>{{ t('admin.actions') }}</th>
            </tr>
          </thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>
      <p class="inline-message" id="users-message"></p>
    </section>
  </main>

  <script>window.I18N = {{ i18n_json|safe }};</script>
  <script src="/nav.js"></script>
  <script src="/admin_users.js"></script>
</body>
</html>
