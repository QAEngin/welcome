<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דו"ח פיצ'רים שבוצעו</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/nav.css">
  <link rel="stylesheet" href="/features_report.css">
</head>
<body>
  <nav class="site-nav">
    <div class="site-nav-inner">
      <a class="brand" href="/home"><span class="brand-kicker">Support Suite</span><span class="brand-main">Services</span></a>
      <button class="nav-toggle" type="button">Menu</button>
      <div class="nav-links">
        <a class="nav-link" href="/sms"><span class="nav-icon"><i class="fa-solid fa-comment-sms"></i></span><span class="nav-label">SMS</span></a>
        <a class="nav-link" href="/bot"><span class="nav-icon"><i class="fa-solid fa-robot"></i></span><span class="nav-label">Bot</span></a>
        <a class="nav-link" href="/f2m"><span class="nav-icon"><i class="fa-solid fa-envelope-open-text"></i></span><span class="nav-label">F2M</span></a>
        <a class="nav-link" href="/recording-storage"><span class="nav-icon"><i class="fa-solid fa-database"></i></span><span class="nav-label">אחסון</span></a>
        <a class="nav-link" href="/human-service"><span class="nav-icon"><i class="fa-solid fa-headset"></i></span><span class="nav-label">מוקד</span></a>
        <a class="nav-link" href="/record"><span class="nav-icon"><i class="fa-solid fa-record-vinyl"></i></span><span class="nav-label">Recordings</span></a>
        <a class="nav-link active" href="/features-report"><span class="nav-icon"><i class="fa-solid fa-chart-simple"></i></span><span class="nav-label">דו"ח פיצ'רים</span></a>
        <a class="nav-link" href="/home"><span class="nav-icon"><i class="fa-solid fa-chart-column"></i></span><span class="nav-label">Dashboard</span></a>
      </div>
      <div class="nav-footer">
        <div class="nav-user">{{ (current_user or "").split("@")[0] }}</div>
        <a class="nav-logout" href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </div>
  </nav>

  <main class="report-wrap">
    <section class="report-panel">
      <header class="report-head">
        <div>
          <p class="welcome">דו"ח חודשי</p>
          <h1>דו"ח פיצ'רים שבוצעו</h1>
        </div>
        <div class="export-control" aria-label="Export report">
          <button id="export-btn" class="export-btn" type="button">
            <i class="fa-solid fa-file-export"></i>
            <span>EXPORT</span>
          </button>
          <select id="export-format" aria-label="Format">
            <option value="">Format</option>
            <option value="csv">CSV</option>
            <option value="pdf">PDF</option>
          </select>
        </div>
      </header>

      <section class="filters-row">
        <label for="month-filter">חודש</label>
        <input id="month-filter" type="month">
        <button id="recordings-detail-export" class="detail-btn" type="button">
          <i class="fa-solid fa-file-lines"></i>
          <span>דו"ח מפורט</span>
        </button>
        <button id="load-report" class="load-btn" type="button">
          <i class="fa-solid fa-rotate"></i>
          <span>הצג</span>
        </button>
      </section>

      <section id="print-area" class="report-table-wrap">
        <div class="summary-row">
          <span id="report-month-label">--/----</span>
          <strong id="report-total">0</strong>
        </div>
        <table class="report-table">
          <thead>
            <tr>
              <th>שירות</th>
              <th>בוצעו</th>
            </tr>
          </thead>
          <tbody id="report-body"></tbody>
        </table>
      </section>

      <p id="report-message" class="inline-message"></p>
    </section>
  </main>

  <script src="/nav.js"></script>
  <script src="/features_report.js"></script>
</body>
</html>
