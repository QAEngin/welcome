<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recordings</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/nav.css">
<link rel="stylesheet" href="/record.css">
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a class="brand" href="/home"><span class="brand-kicker">Support Suite</span><span class="brand-main">Services</span></a>
    <button class="nav-toggle" type="button">Menu</button>
    <div class="nav-links">
      <a class="nav-link" href="/sms"><span class="nav-icon"><i class="fa-solid fa-comment-sms"></i></span><span class="nav-label">SMS</span></a>
      <a class="nav-link" href="/bot"><span class="nav-icon"><i class="fa-solid fa-robot"></i></span><span class="nav-label">Bot</span></a>
      <a class="nav-link active" href="/record"><span class="nav-icon"><i class="fa-solid fa-record-vinyl"></i></span><span class="nav-label">Recordings</span></a>
      <a class="nav-link" href="/home"><span class="nav-icon"><i class="fa-solid fa-chart-column"></i></span><span class="nav-label">Dashboard</span></a>
    </div>
    <div class="nav-footer">
      <div class="nav-user">{{ (current_user or "").split("@")[0] }}</div>
      <a class="nav-logout" href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
  </div>
</nav>

<div class="record-wrap">
  <h2>Recordings</h2>
  <button class="load-btn" onclick="loadData()">Load Recordings</button>

  <table id="table">
      <thead>
          <tr>
              <th>File</th>
              <th>Order</th>
              <th>Domain</th>
              <th>Action</th>
              <th>Status</th>
          </tr>
      </thead>
      <tbody id="table-body"></tbody>
  </table>
</div>

<div id="confirm-modal" class="confirm-modal" style="display:none">
  <div class="confirm-card">
    <h3>Are you sure?</h3>
    <p>Do you want to mark this recording as Done?</p>
    <div class="confirm-actions">
      <button id="confirm-no" class="confirm-btn ghost" type="button">No</button>
      <button id="confirm-yes" class="confirm-btn" type="button">Yes</button>
    </div>
  </div>
</div>

<script>
let pendingDone = null;

async function loadData() {
    const res = await fetch("/recordings-data");
    const data = await res.json();

    let html = "";

    data.forEach((r) => {
        html += `
        <tr>
            <td>${r.name}</td>
            <td>${r.order_id}</td>
            <td style="color:${r.domain ? "black" : "red"}">
                ${r.domain || "MISSING"}
            </td>
            <td class="actions-cell">
                <a href="/download-record/${r.file_id}/${r.domain || "nodomain"}">
                    Download
                </a>
            </td>
            <td class="status-cell">
                <button class="done-btn" onclick="askBeforeDone('${r.file_id}', this)">
                    Done
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("table-body").innerHTML = html;
}

function askBeforeDone(fileId, buttonEl) {
    pendingDone = { fileId, buttonEl };
    document.getElementById("confirm-modal").style.display = "flex";
}

async function markDone(fileId, buttonEl) {
    buttonEl.disabled = true;
    const res = await fetch(`/mark-done/${fileId}`, {
        method: "POST"
    });

    if (!res.ok) {
        buttonEl.disabled = false;
        const body = await res.text();
        alert("Failed to move file to Done folder: " + body);
        return;
    }

    await loadData();
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("confirm-no").addEventListener("click", () => {
        pendingDone = null;
        document.getElementById("confirm-modal").style.display = "none";
    });

    document.getElementById("confirm-yes").addEventListener("click", async () => {
        const task = pendingDone;
        pendingDone = null;
        document.getElementById("confirm-modal").style.display = "none";
        if (!task) return;
        await markDone(task.fileId, task.buttonEl);
    });

    loadData();
});
</script>
<script src="/nav.js"></script>

</body>
</html>
